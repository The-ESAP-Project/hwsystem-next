# 生产环境配置

[app]
# system_name - 已迁移到数据库 (app.system_name)
# system_name = "Homework Management System"
environment = "production"
log_level = "warn"

[server]
host = "0.0.0.0"
port = 8080
workers = 0  # 自动检测

[jwt]
# 生产环境使用更安全的配置
# 注意：以下配置已迁移到数据库，在此仅作为默认值参考
# access_token_expiry = 15
# refresh_token_expiry = 7

[database]
url = "hwsystem.db"
pool_size = 10
timeout = 30

[cache]
type = "redis"
# 默认 TTL (秒)
default_ttl = 3600

[cache.redis]
url = "redis://localhost:6379/"
pool_size = 20

[upload]
dir = "uploads"
# max_size - 已迁移到数据库 (upload.max_size)
# max_size = 10485760 # 10MB
# allowed_types - 已迁移到数据库 (upload.allowed_types)
